name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  quality:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: user
          POSTGRES_PASSWORD: password
          POSTGRES_DB: monolith_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U user -d monolith_db"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://user:password@localhost:5432/monolith_db
      JWT_SECRET: ci-jwt-secret-with-at-least-32-characters
      JWT_REFRESH_SECRET: ci-jwt-refresh-secret-with-at-least-32-chars
      DEFAULT_TENANT_ID: 00000000-0000-4000-8000-000000000001
      QUEUE_DRIVER: memory
      E2E_TESTS: 'true'
      REDIS_TESTS: 'true'

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Audit production dependencies
        run: npm audit --omit=dev --audit-level=high

      - name: Generate Prisma client
        run: npm run db:generate

      - name: Validate Prisma schema
        run: npx prisma validate

      - name: Apply migrations
        run: npx prisma migrate deploy

      - name: Type check
        run: npm run typecheck

      - name: Verify committed OpenAPI contract
        run: npm run openapi:check

      - name: Publish validated OpenAPI contract
        uses: actions/upload-artifact@v4
        with:
          name: ts-monolith-openapi
          path: openapi/openapi.json
          if-no-files-found: error

      - name: Lint
        run: npm run lint

      - name: Run tests
        run: npm test
