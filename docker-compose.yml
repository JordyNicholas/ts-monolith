services:
  postgres:
    image: postgres:15-alpine
    container_name: ts_monolith_postgres
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: monolith_db
    ports:
      - '5432:5432'
    volumes:
      - monolith:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U user -d monolith_db']
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: ts_monolith_redis
    ports:
      - '6379:6379'
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    profiles: ['full']
    build: .
    container_name: ts_monolith_api
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 3333
      DATABASE_URL: postgresql://user:password@postgres:5432/monolith_db
      REDIS_URL: redis://redis:6379
      QUEUE_DRIVER: bullmq
      # Production validation rejects demo secrets. Provide unique values via .env.
      JWT_SECRET: ${JWT_SECRET:?Set JWT_SECRET in .env before using --profile full}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:?Set JWT_REFRESH_SECRET in .env before using --profile full}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:3000}
      DEFAULT_TENANT_ID: 00000000-0000-4000-8000-000000000001
    ports:
      - '3333:3333'
    command: >
      sh -c "npx prisma migrate deploy &&
             npx tsx prisma/seed.ts &&
             node dist/shared/server.js"

  worker:
    profiles: ['full']
    build: .
    container_name: ts_monolith_worker
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://user:password@postgres:5432/monolith_db
      REDIS_URL: redis://redis:6379
      QUEUE_DRIVER: bullmq
      JWT_SECRET: ${JWT_SECRET:?Set JWT_SECRET in .env before using --profile full}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:?Set JWT_REFRESH_SECRET in .env before using --profile full}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:3000}
      DEFAULT_TENANT_ID: 00000000-0000-4000-8000-000000000001
    command: node dist/workers/reports.worker.js

volumes:
  monolith:
